<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ferme Connect</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:url('/static/bg.jpg') no-repeat center center/cover;
overflow:hidden;
}

/* ================= OVERLAY ================= */

.overlay{
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.45);
backdrop-filter:blur(4px);
}

/* ================= LOGIN BOX ================= */

.login-box{
position:relative;
z-index:2;
width:400px;
padding:40px;
border-radius:25px;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(15px);
box-shadow:0 10px 30px rgba(0,0,0,0.4);
text-align:center;
animation:fade 1s ease;
}

/* ================= LOGO ================= */

.logo{
margin-bottom:20px;
}

.logo img{
width:90px;
height:90px;
border-radius:50%;
border:4px solid #4CAF50;
background:white;
padding:5px;
object-fit:cover;
}

.logo h1{
margin-top:10px;
font-size:38px;
color:#4CAF50;
}

.logo p{
color:white;
font-size:15px;
margin-top:5px;
}

/* ================= INPUTS ================= */

.input-box{
margin-top:18px;
text-align:left;
}

.input-box label{
color:white;
font-size:15px;
font-weight:bold;
margin-bottom:6px;
display:block;
}

.input-box input{
width:100%;
padding:14px;
border:none;
border-radius:12px;
outline:none;
font-size:16px;
background:rgba(255,255,255,0.9);
}

/* ================= BUTTON ================= */

button{
width:100%;
margin-top:25px;
padding:14px;
border:none;
border-radius:12px;
background:#4CAF50;
color:white;
font-size:18px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#2e7d32;
transform:scale(1.03);
}

/* ================= FOOTER ================= */

.footer{
margin-top:20px;
color:white;
font-size:14px;
opacity:0.8;
}

/* ================= ANIMATION ================= */

@keyframes fade{

from{
opacity:0;
transform:translateY(30px);
}

to{
opacity:1;
transform:translateY(0);
}

}

</style>
</head>

<body>

<div class="overlay"></div>

<!-- ================= LOGIN ================= -->

<div class="login-box">

<div class="logo">

<img src="/static/logo.png">

<h1>Ferme</h1>

<p>Système intelligent de gestion agricole</p>

</div>

<div class="input-box">

<label>Email</label>

<input
type="email"
id="email"
placeholder="Entrer votre email"
>

</div>

<div class="input-box">

<label>Mot de passe</label>

<input
type="password"
id="password"
placeholder="Entrer votre mot de passe"
>

</div>

<button onclick="login()">

🔐 Se connecter

</button>

<div class="footer">

© Ferme Connect 2026

</div>

</div>

<!-- ================= JS ================= -->

<script>

function login(){

fetch("/login",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

email:
document.getElementById("email").value,

password:
document.getElementById("password").value

})

})

.then(res=>res.json())

.then(data=>{

console.log(data);

if(data.success){

window.location.href="/dashboard";

}else{

alert("❌ Email ou mot de passe incorrect");

}

})

.catch(error=>{

console.log(error);

alert("Erreur serveur");

});

}

</script>

</body>
</html>
